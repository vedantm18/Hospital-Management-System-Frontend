<nav class="navbar navbar-expand-sm bg-primary navbar-dark">
  <ul class="navbar-nav">

    <li class="nav-item">
      <a routerLink="/admin" routerLinkActive="active" class="nav-link">
        Home
      </a>
    </li>

    <li class="nav-item">
      <a routerLink="/createpatient" routerLinkActive="active" class="nav-link">
        Add Patient
      </a>
    </li>

    <li class="nav-item">
      <a routerLink="/appointmentlist" routerLinkActive="active" class="nav-link active">
        Appointments
      </a>
    </li>

  </ul>
</nav>

<div class="container mt-3">

  <hr>

  <h2 class="text-center">
    Appointments
  </h2>

  <marquee class="text-secondary fs-5">
    Welcome to Appointment Dashboard.
    Here you can view all appointments.
  </marquee>

  <hr>

  <div class="mb-3">

    <button class="btn btn-success me-2" routerLink="/create-appointment">
      + Add Appointment
    </button>

    <button class="btn btn-secondary" routerLink="/admin">
      ← Back to Admin Dashboard
    </button>

  </div>

  <h3 class="text-secondary">
    Appointment List
  </h3>

  <br>

  <table class="table table-striped table-bordered">

    <thead class="table-dark">
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Age</th>
        <th>Symptoms</th>
        <th>Number</th>
        <th>Action</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let appointment of appointments">
        <td>{{ appointment.id }}</td>
        <td>{{ appointment.name }}</td>
        <td>{{ appointment.age }}</td>
        <td>{{ appointment.symtomps }}</td>
        <td>{{ appointment.number }}</td>
        <td>
         <button (click)="delete(appointment.id!)" class="btn btn-danger">
  Delete
</button>
        
      </tr>
    </tbody>

  </table>

</div>
